<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">Add New Customer</h4>
        </div>
        <div class="card-body">
          @if (errorMessage) {
            <div class="alert alert-danger">{{ errorMessage }}</div>
          }

          <form [formGroup]="customerForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label for="name" class="form-label">Name <span class="text-danger">*</span></label>
              <input type="text" id="name" class="form-control" formControlName="name" [class.is-invalid]="isInvalid('name')">
              <div class="invalid-feedback">Name is required.</div>
            </div>

            <div class="mb-3">
              <label for="address" class="form-label">Address <span class="text-danger">*</span></label>
              <input type="text" id="address" class="form-control" formControlName="address" [class.is-invalid]="isInvalid('address')">
              <div class="invalid-feedback">Address is required.</div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label for="idCardNumber" class="form-label">ID Card Number <span class="text-danger">*</span></label>
                <input type="text" id="idCardNumber" class="form-control" formControlName="idCardNumber" [class.is-invalid]="isInvalid('idCardNumber')">
                <div class="invalid-feedback">ID card number is required.</div>
              </div>
              
              <div class="col-md-6">
                <label for="phone" class="form-label">Phone Number <span class="text-danger">*</span></label>
                <input type="tel" id="phone" class="form-control" formControlName="phone" [class.is-invalid]="isInvalid('phone')">
                <div class="invalid-feedback">Phone number is required.</div>
              </div>
            </div>

            <div class="mb-4">
              <label for="email" class="form-label">E-mail Address</label>
              <input type="email" id="email" class="form-control" formControlName="email" [class.is-invalid]="isInvalid('email')">
              <div class="invalid-feedback">Please enter a valid email address.</div>
            </div>

            <div class="d-flex justify-content-between">
              <a routerLink="/customers" class="btn btn-secondary">Cancel</a>
              <button type="submit" class="btn btn-success" [disabled]="customerForm.invalid">Save</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
