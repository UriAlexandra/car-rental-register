<div class="container mt-4">
  <h2>{{ isNew ? 'Új jármű rögzítése' : 'Jármű adatainak szerkesztése' }}</h2>

  <div class="card shadow-sm mt-3">
    <div class="card-body">
      <form #vehicleForm="ngForm" (ngSubmit)="save()">

        <div class="row">
          <div class="col-md-6">
            <div class="mb-3">
              <label class="form-label">Típus</label>
              <select class="form-select" [(ngModel)]="vehicle.type" name="type">
                @for (t of types; track t) {
                  <option [value]="t">{{ t }}</option>
                }
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Gyártó és modell <span class="text-danger">*</span></label>
              <input type="text" class="form-control" [(ngModel)]="vehicle.manufacturer" name="manufacturer" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Rendszám / Lajstromszám <span class="text-danger">*</span></label>
              <input type="text" class="form-control" [(ngModel)]="vehicle.licensePlate" name="licensePlate" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Beszerzés dátuma</label>
              <input type="date" class="form-control" [(ngModel)]="vehicle.purchaseDate" name="purchaseDate">
            </div>
          </div>

          <div class="col-md-6">
            <div class="mb-3">
              <label class="form-label">Alvázszám</label>
              <input type="text" class="form-control" [(ngModel)]="vehicle.chassisNumber" name="chassisNumber">
            </div>

            <div class="mb-3">
              <label class="form-label">Sorszám (Belső azonosító)</label>
              <input type="text" class="form-control" [(ngModel)]="vehicle.serialNumber" name="serialNumber">
            </div>

            <div class="row">
              <div class="col-6 mb-3">
                <label class="form-label">Napi díj (Ft)</label>
                <input type="number" class="form-control" [(ngModel)]="vehicle.dailyFee" name="dailyFee" min="0">
              </div>
              <div class="col-6 mb-3">
                <label class="form-label">Km díj (Ft)</label>
                <input type="number" class="form-control" [(ngModel)]="vehicle.kmFee" name="kmFee" min="0">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Státusz</label>
              <select class="form-select" [(ngModel)]="vehicle.status" name="status">
                @for (s of statuses; track s) {
                  <option [value]="s">{{ s }}</option>
                }
              </select>
            </div>
          </div>
        </div>

        <hr>
        <div class="d-flex justify-content-end">
          <button type="button" class="btn btn-secondary me-2" (click)="cancel()">Mégse</button>
          <button type="submit" class="btn btn-primary" [disabled]="vehicleForm.invalid">Mentés</button>
        </div>

      </form>
    </div>
  </div>
</div>
